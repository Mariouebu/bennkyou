<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareQ - 友達と問題作成・リマインダー</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts & FontAwesome Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col antialiased">

  <!-- React, ReactDOM, and Babel Standalone (for JSX parsing in browser) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect, useRef, useMemo } = React;

    // --- Firebase環境設定 ---
    const firebaseConfig = typeof __firebase_config !== 'undefined' 
      ? JSON.parse(__firebase_config) 
      : {
          apiKey: "",
          authDomain: "mock-project.firebaseapp.com",
          projectId: "mock-project",
          storageBucket: "mock-project.appspot.com",
          messagingSenderId: "123456789",
          appId: "1:123456789:web:abcdef"
        };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'share-q-app-id';

    function App() {
      // --- 状態管理 ---
      const [user, setUser] = useState(null);
      const [username, setUsername] = useState('');
      const [isSettingUsername, setIsSettingUsername] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard'); // dashboard, questions, quiz, reminders, members
      
      // グループ管理
      const [groupId, setGroupId] = useState('default-room');
      const [joinRoomInput, setJoinRoomInput] = useState('');
      const [copySuccess, setCopySuccess] = useState(false);

      // データリスト（Firestoreから同期）
      const [questions, setQuestions] = useState([]);
      const [activityLog, setActivityLog] = useState([]);
      const [roomMembers, setRoomMembers] = useState([]);

      // モーダル・フォーム状態
      const [isCreateModalOpen, setIsCreateModalOpen] = useState(false);
      const [qType, setQType] = useState('choice'); // choice, ox, text
      const [qTitle, setQTitle] = useState('');
      const [qOptions, setQOptions] = useState(['', '', '', '']);
      const [qCorrectChoice, setQCorrectChoice] = useState(0);
      const [qCorrectOx, setQCorrectOx] = useState('O');
      const [qCorrectText, setQCorrectText] = useState('');
      const [qExplanation, setQExplanation] = useState('');
      const [qInterval, setQInterval] = useState('1'); // リマインダー用の復習間隔（日）

      // クイズ実行状態
      const [quizActive, setQuizActive] = useState(false);
      const [quizIndex, setQuizIndex] = useState(0);
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [textAnswer, setTextAnswer] = useState('');
      const [quizResults, setQuizResults] = useState([]); // [{questionId, isCorrect}]
      const [quizFinished, setQuizFinished] = useState(false);

      // 通知トースト
      const [toast, setToast] = useState(null);

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      // --- Firebase 認証初期化 ---
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Auth Error:", err);
            showToast("認証に失敗しました。オフラインモードで実行します。", "error");
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (usr) => {
          if (usr) {
            setUser(usr);
            // ローカルストレージ等から一時的に名前を取得
            const savedName = localStorage.getItem(`uname_${usr.uid}`);
            setUsername(savedName || `ユーザー_${usr.uid.substring(0, 5)}`);
          }
        });
        return () => unsubscribe();
      }, []);

      // ユーザー名のFirestore更新・保存
      const handleSaveUsername = async () => {
        if (!username.trim() || !user) return;
        localStorage.setItem(`uname_${user.uid}`, username);
        setIsSettingUsername(false);
        showToast(`ユーザー名を 「${username}」 に設定しました！`);

        if (groupId) {
          try {
            const memberDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'members', `${groupId}_${user.uid}`);
            await setDoc(memberDocRef, {
              uid: user.uid,
              roomId: groupId,
              name: username,
              lastActive: Date.now()
            }, { merge: true });
            
            // アクティビティログ追加
            await addActivity(`${username} が参加しました。`);
          } catch (e) {
            console.error(e);
          }
        }
      };

      // 共同アクティビティログの登録
      const addActivity = async (actionText) => {
        if (!user) return;
        try {
          const logCol = collection(db, 'artifacts', appId, 'public', 'data', 'activities');
          await addDoc(logCol, {
            roomId: groupId,
            text: actionText,
            user: username || user.uid.substring(0, 5),
            timestamp: Date.now()
          });
        } catch (e) {
          console.error("Error adding activity:", e);
        }
      };

      // --- Firestore データ監視リアルタイム更新 ---
      useEffect(() => {
        if (!user || !groupId) return;

        // 1. 問題データの取得 (セグメント数5のコレクションから取得し、JSメモリでフィルタ)
        const qCollection = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
        const unsubQuestions = onSnapshot(qCollection, (snapshot) => {
          const list = [];
          snapshot.forEach((doc) => {
            const data = doc.data();
            if (data.roomId === groupId) {
              list.push({ id: doc.id, ...data });
            }
          });
          // 作成日時順
          list.sort((a, b) => b.createdAt - a.createdAt);
          setQuestions(list);
        }, (err) => {
          console.error("Questions load error", err);
        });

        // 2. メンバーリストの取得 (JSメモリでルーム内フィルタ)
        const mCollection = collection(db, 'artifacts', appId, 'public', 'data', 'members');
        const unsubMembers = onSnapshot(mCollection, (snapshot) => {
          const list = [];
          snapshot.forEach((doc) => {
            const data = doc.data();
            if (data.roomId === groupId) {
              list.push({ id: doc.id, ...data });
            }
          });
          setRoomMembers(list);
        }, (err) => console.error(err));

        // 3. アクティビティログの取得 (JSメモリでルーム内フィルタ)
        const aCollection = collection(db, 'artifacts', appId, 'public', 'data', 'activities');
        const unsubActivities = onSnapshot(aCollection, (snapshot) => {
          const list = [];
          snapshot.forEach((doc) => {
            const data = doc.data();
            if (data.roomId === groupId) {
              list.push({ id: doc.id, ...data });
            }
          });
          list.sort((a, b) => b.timestamp - a.timestamp);
          setActivityLog(list.slice(0, 15)); // 直近15件
        }, (err) => console.error(err));

        // 自身をメンバー登録
        const registerMember = async () => {
          const memberDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'members', `${groupId}_${user.uid}`);
          await setDoc(memberDocRef, {
            uid: user.uid,
            roomId: groupId,
            name: username || `ユーザー_${user.uid.substring(0, 5)}`,
            lastActive: Date.now()
          }, { merge: true });
        };
        registerMember();

        return () => {
          unsubQuestions();
          unsubMembers();
          unsubActivities();
        };
      }, [user, groupId, username]);

      // --- ルームの変更・新規作成 ---
      const handleJoinRoom = (e) => {
        e.preventDefault();
        if (!joinRoomInput.trim()) return;
        const targetRoom = joinRoomInput.trim();
        setGroupId(targetRoom);
        showToast(`ルーム「${targetRoom}」に切り替えました。`);
        setJoinRoomInput('');
      };

      // クリップボードに招待URLをコピー
      const copyInviteLink = () => {
        const textToCopy = `${window.location.origin}${window.location.pathname}?room=${groupId}`;
        const tempInput = document.createElement('input');
        tempInput.value = textToCopy;
        document.body.appendChild(tempInput);
        tempInput.select();
        try {
          document.execCommand('copy');
          setCopySuccess(true);
          showToast("招待用ルームID/リンクをコピーしました！");
          setTimeout(() => setCopySuccess(false), 2000);
        } catch (err) {
          showToast("コピーに失敗しました", "error");
        }
        document.body.removeChild(tempInput);
      };

      // パラメータからのルーム読み込み
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const roomParam = params.get('room');
        if (roomParam) {
          setGroupId(roomParam);
          showToast(`招待リンクからルーム 「${roomParam}」 に入室しました。`);
        }
      }, []);

      // --- 問題作成処理 ---
      const handleCreateQuestion = async (e) => {
        e.preventDefault();
        if (!qTitle.trim()) {
          showToast("問題内容を入力してください。", "error");
          return;
        }

        let correctAnswer = '';
        let optionsList = [];

        if (qType === 'choice') {
          optionsList = qOptions.filter(opt => opt.trim() !== '');
          if (optionsList.length < 2) {
            showToast("選択肢は最低2つ以上入力してください。", "error");
            return;
          }
          correctAnswer = qOptions[qCorrectChoice];
        } else if (qType === 'ox') {
          optionsList = ['O (正しい)', 'X (誤り)'];
          correctAnswer = qCorrectOx;
        } else {
          correctAnswer = qCorrectText.trim();
          if (!correctAnswer) {
            showToast("正解のテキストを入力してください。", "error");
            return;
          }
        }

        const newQuestion = {
          roomId: groupId,
          title: qTitle,
          type: qType,
          options: optionsList,
          correctAnswer: correctAnswer,
          explanation: qExplanation,
          creator: username || user.uid.substring(0, 5),
          creatorId: user.uid,
          createdAt: Date.now(),
          // リマインダー設定（忘却曲線復習用）
          intervalDays: parseInt(qInterval) || 1,
          nextReviewDate: Date.now() + (parseInt(qInterval) || 1) * 24 * 60 * 60 * 1000,
          timesReviewed: 0,
          difficulty: 'normal'
        };

        try {
          const qCollection = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
          await addDoc(qCollection, newQuestion);
          
          await addActivity(`新しい問題「${qTitle.substring(0, 10)}...」を追加しました。`);
          showToast("新しい問題を作成しました！");
          
          // フォーム初期化
          setQTitle('');
          setQOptions(['', '', '', '']);
          setQCorrectText('');
          setQExplanation('');
          setIsCreateModalOpen(false);
        } catch (err) {
          console.error(err);
          showToast("問題の作成に失敗しました。", "error");
        }
      };

      // --- 問題削除 ---
      const handleDeleteQuestion = async (qId, title) => {
        if (!window.confirm(`「${title}」を本当に削除しますか？`)) return;
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'questions', qId);
          await deleteDoc(docRef);
          await addActivity(`問題「${title.substring(0, 10)}...」を削除しました。`);
          showToast("問題を削除しました。");
        } catch (e) {
          showToast("削除に失敗しました。", "error");
        }
      };

      // --- クイズセッション制御 ---
      const startQuiz = () => {
        if (questions.length === 0) {
          showToast("問題がまだありません。作成してください。", "error");
          return;
        }
        setQuizActive(true);
        setQuizIndex(0);
        setSelectedAnswer(null);
        setTextAnswer('');
        setQuizResults([]);
        setQuizFinished(false);
      };

      const handleAnswerSubmit = (answer) => {
        const currentQ = questions[quizIndex];
        let isCorrect = false;

        if (currentQ.type === 'choice') {
          isCorrect = answer === currentQ.correctAnswer;
        } else if (currentQ.type === 'ox') {
          isCorrect = answer === currentQ.correctAnswer;
        } else {
          isCorrect = answer.trim().toLowerCase() === currentQ.correctAnswer.trim().toLowerCase();
        }

        setSelectedAnswer(answer);
        setQuizResults([...quizResults, { questionId: currentQ.id, title: currentQ.title, isCorrect, chosen: answer, correct: currentQ.correctAnswer }]);
      };

      const nextQuestion = () => {
        setSelectedAnswer(null);
        setTextAnswer('');
        if (quizIndex + 1 < questions.length) {
          setQuizIndex(quizIndex + 1);
        } else {
          setQuizFinished(true);
          // 復習の記録とリマインダー日程の更新
          updateReminderSchedules();
        }
      };

      // クイズ終了時に忘却曲線に基づく復習スケジュールを自動更新
      const updateReminderSchedules = async () => {
        quizResults.forEach(async (res) => {
          const qObj = questions.find(q => q.id === res.questionId);
          if (!qObj) return;

          let newInterval = qObj.intervalDays || 1;
          if (res.isCorrect) {
            // 正解したら、次回までの間隔を2倍にする（1日 -> 2日 -> 4日 -> 8日 ...）
            newInterval = Math.min(newInterval * 2, 30); 
          } else {
            // 間違えたら復習スパンを短く（1日）に戻す
            newInterval = 1;
          }

          const nextDate = Date.now() + newInterval * 24 * 60 * 60 * 1000;
          try {
            const qDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'questions', qObj.id);
            await updateDoc(qDocRef, {
              intervalDays: newInterval,
              nextReviewDate: nextDate,
              timesReviewed: (qObj.timesReviewed || 0) + 1
            });
          } catch (e) {
            console.error(e);
          }
        });
        showToast("クイズ結果を保存し、復習予定を更新しました！");
      };

      // --- リマインダー管理（今日復習が必要な問題） ---
      const reviewRequiredQuestions = useMemo(() => {
        const now = Date.now();
        return questions.filter(q => !q.nextReviewDate || q.nextReviewDate <= now);
      }, [questions]);

      // リマインダー（手動での完了・リセット）
      const markAsReviewed = async (qId, wasCorrect) => {
        const qObj = questions.find(q => q.id === qId);
        if (!qObj) return;

        let newInterval = qObj.intervalDays || 1;
        if (wasCorrect) {
          newInterval = Math.min(newInterval * 2, 30);
        } else {
          newInterval = 1;
        }
        const nextDate = Date.now() + newInterval * 24 * 60 * 60 * 1000;

        try {
          const qDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'questions', qId);
          await updateDoc(qDocRef, {
            intervalDays: newInterval,
            nextReviewDate: nextDate,
            timesReviewed: (qObj.timesReviewed || 0) + 1
          });
          showToast(`復習完了！次回の復習は ${newInterval}日後 です。`);
        } catch (e) {
          console.error(e);
        }
      };

      return (
        <div className="flex flex-col min-h-screen">
          
          {/* トースト通知 */}
          {toast && (
            <div className={`fixed top-5 right-5 z-50 px-6 py-3 rounded-xl shadow-xl flex items-center gap-3 border transition-all transform duration-300 translate-y-0 text-white ${
              toast.type === 'error' ? 'bg-rose-500 border-rose-400' : 'bg-emerald-600 border-emerald-500'
            }`}>
              <i className={`fa-solid ${toast.type === 'error' ? 'fa-circle-xmark' : 'fa-circle-check'} text-lg`}></i>
              <span className="font-medium text-sm">{toast.message}</span>
            </div>
          )}

          {/* ヘッダー */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-40 px-4 py-3 sm:px-6">
            <div className="max-w-7xl mx-auto flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
              
              {/* ロゴ＆ルーム表示 */}
              <div className="flex items-center gap-4">
                <div className="bg-indigo-600 text-white p-2.5 rounded-xl flex items-center justify-center shadow-md shadow-indigo-100">
                  <i className="fa-solid fa-graduation-cap text-xl"></i>
                </div>
                <div>
                  <h1 className="text-xl font-bold tracking-tight text-slate-900 flex items-center gap-2">
                    ShareQ
                    <span className="text-xs px-2.5 py-0.5 rounded-full bg-indigo-50 text-indigo-700 font-semibold border border-indigo-100">Beta</span>
                  </h1>
                  <p className="text-xs text-slate-500 flex items-center gap-1.5 mt-0.5">
                    <span className="inline-block w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    現在の共同ルーム: <strong className="text-indigo-600 font-semibold">{groupId}</strong>
                  </p>
                </div>
              </div>

              {/* ルーム招待 ＆ プロファイル */}
              <div className="flex flex-wrap items-center gap-3">
                {/* 部屋の切り替え */}
                <form onSubmit={handleJoinRoom} className="flex items-center bg-slate-100 rounded-lg p-1 border border-slate-200">
                  <input
                    type="text"
                    placeholder="別のルームID..."
                    className="bg-transparent px-3 py-1 text-xs outline-none w-32 focus:w-40 transition-all font-medium"
                    value={joinRoomInput}
                    onChange={(e) => setJoinRoomInput(e.target.value)}
                  />
                  <button type="submit" className="bg-white hover:bg-slate-50 text-slate-700 p-1.5 rounded-md text-xs font-semibold shadow-sm transition">
                    移動
                  </button>
                </form>

                {/* 友達を招待 */}
                <button
                  onClick={copyInviteLink}
                  className="bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 text-indigo-700 px-3 py-1.5 rounded-lg text-xs font-semibold flex items-center gap-1.5 transition"
                >
                  <i className="fa-solid fa-user-plus"></i>
                  <span>招待リンク</span>
                </button>

                {/* ユーザー名設定 */}
                <div className="bg-slate-100 border border-slate-200 rounded-lg px-3 py-1.5 flex items-center gap-2">
                  <i className="fa-solid fa-user text-slate-500 text-xs"></i>
                  <span className="text-xs font-medium text-slate-700 truncate max-w-[120px]">
                    {username || 'ゲストユーザー'}
                  </span>
                  <button 
                    onClick={() => setIsSettingUsername(true)}
                    className="text-slate-400 hover:text-indigo-600 transition"
                    title="名前を変更"
                  >
                    <i className="fa-solid fa-pen text-[10px]"></i>
                  </button>
                </div>
              </div>

            </div>
          </header>

          {/* ユーザー名編集モーダル */}
          {isSettingUsername && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border border-slate-100 animate-in fade-in zoom-in-95 duration-200">
                <h3 className="text-lg font-bold text-slate-900 mb-2">ユーザー名の変更</h3>
                <p className="text-xs text-slate-500 mb-4">
                  友達と一緒に問題を解いたり作成したりする際に表示されるニックネームを設定します。
                </p>
                <input
                  type="text"
                  className="w-full px-4 py-2 border border-slate-200 rounded-xl mb-4 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm"
                  placeholder="例: たろう、Sakura"
                  value={username}
                  onChange={(e) => setUsername(e.target.value)}
                  maxLength={15}
                  autoFocus
                />
                <div className="flex gap-2 justify-end">
                  <button
                    onClick={() => setIsSettingUsername(false)}
                    className="px-4 py-2 text-xs font-medium text-slate-600 hover:bg-slate-50 rounded-lg transition"
                  >
                    キャンセル
                  </button>
                  <button
                    onClick={handleSaveUsername}
                    className="px-4 py-2 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition"
                  >
                    保存する
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* メインレイアウト */}
          <main className="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            {/* 左側：ナビゲーション・サイドバー */}
            <div className="lg:col-span-1 flex flex-col gap-6">
              
              {/* ナビゲーションメニュー */}
              <div className="bg-white rounded-2xl border border-slate-200/80 p-3 shadow-sm">
                <p className="text-[11px] font-bold tracking-wider text-slate-400 uppercase px-3 mb-2">メニュー</p>
                <nav className="space-y-1">
                  <button
                    onClick={() => { setActiveTab('dashboard'); setQuizActive(false); }}
                    className={`w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-sm font-semibold transition ${
                      activeTab === 'dashboard' ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'
                    }`}
                  >
                    <span className="flex items-center gap-2.5">
                      <i className="fa-solid fa-gauge-high"></i>
                      ダッシュボード
                    </span>
                    <i className="fa-solid fa-chevron-right text-[10px] opacity-60"></i>
                  </button>

                  <button
                    onClick={() => { setActiveTab('questions'); setQuizActive(false); }}

                                  <button
                                    onClick={() => handleDeleteQuestion(q.id, q.title)}
                                    className="text-slate-400 hover:text-rose-600 p-1 transition"
                                    title="削除"
                                  >
                                    <i className="fa-solid fa-trash-can"></i>
                                  </button>
                                </div>
                              </div>

                            </div>
                          ))}
                        </div>
                      )}

                    </div>
                  )}

                  {/* --- 3. 今日の復習・リマインダータブ --- */}
                  {activeTab === 'reminders' && (
                    <div className="space-y-4">
                      <div>
                        <h2 className="text-lg font-bold text-slate-900">本日の復習タスク</h2>
                        <p className="text-xs text-slate-500">
                          忘却曲線理論（1日後、3日後、7日後...）に基づいて、あなたの復習が必要な問題を抽出しています。
                        </p>
                      </div>

                      {reviewRequiredQuestions.length === 0 ? (
                        <div className="bg-white border border-slate-200 rounded-2xl p-8 text-center">
                          <div className="inline-flex items-center justify-center w-12 h-12 bg-emerald-50 rounded-full text-emerald-500 mb-3">
                            <i className="fa-solid fa-circle-check text-xl"></i>
                          </div>
                          <p className="text-sm font-semibold text-slate-700 mb-1">今日の復習はすべてクリアです！</p>
                          <p className="text-xs text-slate-400">素晴らしい学習ペースです。また明日確認しましょう。</p>
                        </div>
                      ) : (
                        <div className="space-y-3">
                          {reviewRequiredQuestions.map((q) => (
                            <div key={q.id} className="bg-white rounded-xl border border-slate-200 p-4 flex flex-col md:flex-row justify-between md:items-center gap-4">
                              <div className="space-y-1">
                                <div className="flex items-center gap-2">
                                  <span className="text-[10px] px-2 py-0.5 rounded bg-amber-50 border border-amber-200 text-amber-700 font-bold">
                                    復習間隔: {q.intervalDays}日
                                  </span>
                                  <span className="text-xs text-slate-400">
                                    作成者: {q.creator}
                                  </span>
                                </div>
                                <h3 className="text-sm font-bold text-slate-800">{q.title}</h3>
                              </div>

                              <div className="flex gap-2 flex-shrink-0">
                                <button
                                  onClick={() => markAsReviewed(q.id, false)}
                                  className="border border-rose-200 bg-rose-50/50 hover:bg-rose-50 text-rose-700 text-xs font-semibold px-3 py-1.5 rounded-lg transition"
                                >
                                  まだ未習得 (翌日復習)
                                </button>
                                <button
                                  onClick={() => markAsReviewed(q.id, true)}
                                  className="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold px-3 py-1.5 rounded-lg transition"
                                >
                                  覚えている (次回倍の間隔)
                                </button>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  )}

                  {/* --- 4. メンバータブ --- */}
                  {activeTab === 'members' && (
                    <div className="space-y-4">
                      <div>
                        <h2 className="text-lg font-bold text-slate-900">ルームのメンバー一覧</h2>
                        <p className="text-xs text-slate-500">このルーム ID <strong>{groupId}</strong> を共有して、一緒に勉強しましょう！</p>
                      </div>

                      <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
                        <div className="px-4 py-3 bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-500 uppercase tracking-wider">
                          参加中のユーザー ({roomMembers.length})
                        </div>
                        <ul className="divide-y divide-slate-100">
                          {roomMembers.map((member) => (
                            <li key={member.id} className="p-4 flex items-center justify-between">
                              <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-sm">
                                  {(member.name || 'U').substring(0, 1)}
                                </div>
                                <div>
                                  <p className="text-sm font-semibold text-slate-800">
                                    {member.name} 
                                    {member.uid === user?.uid && <span className="text-[10px] ml-1.5 bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded">あなた</span>}
                                  </p>
                                  <p className="text-[10px] text-slate-400">UID: {member.uid}</p>
                                </div>
                              </div>
                              <span className="text-[10px] px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-700 font-semibold flex items-center gap-1">
                                <span className="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                                アクティブ
                              </span>
                            </li>
                          ))}
                        </ul>
                      </div>

                      {/* 招待説明 */}
                      <div className="bg-indigo-50 border border-indigo-100 rounded-2xl p-5 text-indigo-900 space-y-3">
                        <h4 className="text-sm font-bold flex items-center gap-1.5">
                          <i className="fa-solid fa-share-nodes"></i>
                          友達を招待する方法
                        </h4>
                        <p className="text-xs leading-relaxed">
                          このルームで友達と一緒に学習する手順はとても簡単です！
                        </p>
                        <ol className="text-xs list-decimal list-inside space-y-1.5 text-indigo-950">
                          <li>上の <strong>「招待リンク」</strong> ボタンを押して専用URLをコピー。</li>
                          <li>LINEやDiscordなどで友達にURLを送る。</li>
                          <li>友達がアクセスすると、自動的にこの <strong>{groupId}</strong> ルームに参加して、リアルタイムで問題を共有できます。</li>
                        </ol>
                      </div>

                    </div>
                  )}

                </div>
              )}

            </div>
          </main>

          {/* --- 新規問題追加モーダル --- */}
          {isCreateModalOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 overflow-y-auto">
              <div className="bg-white rounded-2xl max-w-xl w-full p-6 shadow-2xl border border-slate-100 animate-in fade-in zoom-in-95 duration-200 max-h-[90vh] flex flex-col justify-between">
                
                {/* ヘッダー */}
                <div className="flex items-center justify-between border-b border-slate-100 pb-3 mb-4">
                  <h3 className="text-lg font-bold text-slate-900 flex items-center gap-2">
                    <i className="fa-solid fa-plus text-indigo-600"></i>
                    新しい問題を作成
                  </h3>
                  <button 
                    onClick={() => setIsCreateModalOpen(false)}
                    className="text-slate-400 hover:text-slate-600 transition"
                  >
                    <i className="fa-solid fa-xmark text-lg"></i>
                  </button>
                </div>

                {/* フォームボディ（スクロール対応） */}
                <form onSubmit={handleCreateQuestion} className="space-y-4 overflow-y-auto custom-scrollbar flex-1 pr-1 pb-4">
                  
                  {/* 問題タイプ */}
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-2">問題の形式</label>
                    <div className="grid grid-cols-3 gap-2">
                      <button
                        type="button"
                        onClick={() => setQType('choice')}
                        className={`py-2 px-3 rounded-lg border text-xs font-bold transition ${
                          qType === 'choice' ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'border-slate-200 hover:bg-slate-50'
                        }`}
                      >
                        <i className="fa-solid fa-list-ol mr-1"></i>
                        4択問題
                      </button>
                      <button
                        type="button"
                        onClick={() => setQType('ox')}
                        className={`py-2 px-3 rounded-lg border text-xs font-bold transition ${
                          qType === 'ox' ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'border-slate-200 hover:bg-slate-50'
                        }`}
                      >
                        <i className="fa-solid fa-check-double mr-1"></i>
                        ○×判定
                      </button>
                      <button
                        type="button"
                        onClick={() => setQType('text')}
                        className={`py-2 px-3 rounded-lg border text-xs font-bold transition ${
                          qType === 'text' ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'border-slate-200 hover:bg-slate-50'
                        }`}
                      >
                        <i className="fa-solid fa-keyboard mr-1"></i>
                        記述式
                      </button>
                    </div>
                  </div>

                  {/* 問題本文 */}
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1.5">問題の内容・問いかけ</label>
                    <textarea
                      required
                      rows="3"
                      className="w-full px-4 py-2 text-sm border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
                      placeholder="例: 日本で最も標高の高い、山梨県と静岡県にまたがる山は何？"
                      value={qTitle}
                      onChange={(e) => setQTitle(e.target.value)}
                    ></textarea>
                  </div>

                  {/* 回答の入力（タイプ毎に分岐） */}
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1.5">解答の設定</label>

                    {/* 4択オプション */}
                    {qType === 'choice' && (
                      <div className="space-y-2">
                        {qOptions.map((opt, oIdx) => (
                          <div key={oIdx} className="flex items-center gap-2">
                            <input
                              type="radio"
                              name="correctChoice"
                              checked={qCorrectChoice === oIdx}
                              onChange={() => setQCorrectChoice(oIdx)}
                              className="w-4 h-4 text-indigo-600 focus:ring-indigo-500 border-slate-300"
                            />
                            <input
                              type="text"
                              required={oIdx < 2} // 最低2つの選択肢は必須
                              placeholder={`選択肢 ${oIdx + 1} ${oIdx >= 2 ? '(任意)' : ''}`}
                              className="flex-1 px-3 py-1.5 text-xs border border-slate-200 rounded-lg outline-none focus:border-indigo-500"
                              value={opt}
                              onChange={(e) => {
                                const newOpts = [...qOptions];
                                newOpts[oIdx] = e.target.value;
                                setQOptions(newOpts);
                              }}
                            />
                          </div>
                        ))}
                        <p className="text-[10px] text-slate-400 mt-1">※ ラジオボタンを選択しているものが「正解」となります。</p>
                      </div>
                    )}

                    {/* OX判定 */}
                    {qType === 'ox' && (
                      <div className="flex gap-4">
                        <button
                          type="button"
                          onClick={() => setQCorrectOx('O')}
                          className={`flex-1 py-3 border-2 rounded-xl font-bold transition flex flex-col items-center justify-center ${
                            qCorrectOx === 'O' ? 'bg-emerald-50 border-emerald-500 text-emerald-800' : 'border-slate-200 hover:bg-slate-50'
                          }`}
                        >
                          <span className="text-xl">O</span>
                          <span className="text-[10px]">正しい</span>
                        </button>
                        <button
                          type="button"
                          onClick={() => setQCorrectOx('X')}
                          className={`flex-1 py-3 border-2 rounded-xl font-bold transition flex flex-col items-center justify-center ${
                            qCorrectOx === 'X' ? 'bg-rose-50 border-rose-500 text-rose-800' : 'border-slate-200 hover:bg-slate-50'
                          }`}
                        >
                          <span className="text-xl">X</span>
                          <span className="text-[10px]">誤り</span>
                        </button>
                      </div>
                    )}

                    {/* 記述式 */}
                    {qType === 'text' && (
                      <input
                        type="text"
                        required
                        placeholder="模範解答を入力してください (例: 富士山)"
                        className="w-full px-4 py-2 text-xs border border-slate-200 rounded-xl outline-none focus:border-indigo-500"
                        value={qCorrectText}
                        onChange={(e) => setQCorrectText(e.target.value)}
                      />
                    )}
                  </div>

                  {/* 解説（任意） */}
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1.5">解説 (任意)</label>
                    <textarea
                      rows="2"
                      className="w-full px-4 py-2 text-xs border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition"
                      placeholder="正解の背景や豆知識など、回答後に表示される解説文です。"
                      value={qExplanation}
                      onChange={(e) => setQExplanation(e.target.value)}
                    ></textarea>
                  </div>

                  {/* リマインダー間隔 */}
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1.5">初期復習スパン</label>
                    <select
                      className="w-full px-3 py-2 text-xs border border-slate-200 rounded-lg outline-none bg-white focus:border-indigo-500"
                      value={qInterval}
                      onChange={(e) => setQInterval(e.target.value)}
                    >
                      <option value="1">1日（短期定着 - 毎日復習が必要）</option>
                      <option value="3">3日（基本セット）</option>
                      <option value="7">7日（一週間おき - 中長期ターゲット）</option>
                    </select>
                  </div>

                  {/* フッター・送信 */}
                  <div className="flex gap-2 justify-end pt-3 border-t border-slate-100">
                    <button
                      type="button"
                      onClick={() => setIsCreateModalOpen(false)}
                      className="px-4 py-2 text-xs font-semibold text-slate-600 hover:bg-slate-50 rounded-lg transition"
                    >
                      キャンセル
                    </button>
                    <button
                      type="submit"
                      className="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs rounded-lg shadow transition"
                    >
                      問題を作成して共有
                    </button>
                  </div>

                </form>

              </div>
            </div>
          )}

          {/* フッター */}
          <footer className="bg-white border-t border-slate-200 py-6 px-4 mt-auto">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4 text-xs text-slate-400">
              <p>&copy; 2026 ShareQ. 友達と一緒に解いて覚える、忘却曲線リマインダーシステム。</p>
              <div className="flex gap-4">
                <span className="hover:text-slate-600 cursor-pointer">利用規約</span>
                <span className="hover:text-slate-600 cursor-pointer">プライバシーポリシー</span>
              </div>
            </div>
          </footer>

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>

  <!-- React マウント用ベースコンテナ -->
  <div id="root">
    <!-- ローディング時の一時表示 -->
    <div class="min-h-screen flex items-center justify-center bg-slate-50">
      <div class="text-center space-y-4">
        <div class="inline-block w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-sm text-slate-500 font-medium">アプリケーションを起動中...</p>
      </div>
    </div>
  </div>

</body>
</html>
