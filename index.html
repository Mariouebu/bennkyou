<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareQ - 友達と問題作成・リマインダー</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col antialiased">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect, useMemo } = React;

    // --- Firebase環境設定 ---
    const firebaseConfig = typeof __firebase_config !== 'undefined' 
      ? JSON.parse(__firebase_config) 
      : {
          apiKey: "",
          authDomain: "mock-project.firebaseapp.com",
          projectId: "mock-project",
          storageBucket: "mock-project.appspot.com",
          messagingSenderId: "123456789",
          appId: "1:123456789:web:abcdef"
        };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'share-q-app-id';

    function App() {
      // --- 状態管理 ---
      const [user, setUser] = useState(null);
      const [username, setUsername] = useState('');
      const [isSettingUsername, setIsSettingUsername] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard');
      
      // グループ管理
      const [groupId, setGroupId] = useState('default-room');
      const [joinRoomInput, setJoinRoomInput] = useState('');

      // データリスト（Firestoreから同期。セグメントエラー対策のため、JSメモリ側でroomIdフィルタ）
      const [questions, setQuestions] = useState([]);
      const [activityLog, setActivityLog] = useState([]);
      const [roomMembers, setRoomMembers] = useState([]);

      // モーダル・フォーム状態
      const [isCreateModalOpen, setIsCreateModalOpen] = useState(false);
      const [qType, setQType] = useState('choice'); 
      const [qTitle, setQTitle] = useState('');
      const [qOptions, setQOptions] = useState(['', '', '', '']);
      const [qCorrectChoice, setQCorrectChoice] = useState(0);
      const [qCorrectOx, setQCorrectOx] = useState('O');
      const [qCorrectText, setQCorrectText] = useState('');
      const [qExplanation, setQExplanation] = useState('');
      const [qInterval, setQInterval] = useState('1'); 

      // クイズ実行状態
      const [quizActive, setQuizActive] = useState(false);
      const [quizIndex, setQuizIndex] = useState(0);
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [textAnswer, setTextAnswer] = useState('');
      const [quizResults, setQuizResults] = useState([]); 
      const [quizFinished, setQuizFinished] = useState(false);

      // 通知トースト
      const [toast, setToast] = useState(null);

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      // --- Firebase 認証初期化 ---
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Auth Error:", err);
            showToast("認証に失敗しました。", "error");
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (usr) => {
          if (usr) {
            setUser(usr);
            const savedName = localStorage.getItem(`uname_${usr.uid}`);
            setUsername(savedName || `ユーザー_${usr.uid.substring(0, 5)}`);
          }
        });
        return () => unsubscribe();
      }, []);

      // ユーザー名のFirestore更新・保存
      const handleSaveUsername = async () => {
        if (!username.trim() || !user) return;
        localStorage.setItem(`uname_${user.uid}`, username);
        setIsSettingUsername(false);
        showToast(`ユーザー名を 「${username}」 に設定しました！`);

        if (groupId) {
          try {
            const memberDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'members', `${groupId}_${user.uid}`);
            await setDoc(memberDocRef, {
              uid: user.uid,
              roomId: groupId,
              name: username,
              lastActive: Date.now()
            }, { merge: true });
            
            await addActivity(`${username} が参加しました。`);
          } catch (e) {
            console.error(e);
          }
        }
      };

      // アクティビティログの登録
      const addActivity = async (actionText) => {
        if (!user) return;
        try {
          const logCol = collection(db, 'artifacts', appId, 'public', 'data', 'activities');
          await addDoc(logCol, {
            roomId: groupId,
            text: actionText,
            user: username || user.uid.substring(0, 5),
            timestamp: Date.now()
          });
        } catch (e) {
          console.error("Error adding activity:", e);
        }
      };

      // --- Firestore データ同期（セグメントエラーを回避するため5つの奇数セグメント固定） ---
      useEffect(() => {
        if (!user || !groupId) return;

        // 1. 問題データの取得
        const qCollection = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
        const unsubQuestions = onSnapshot(qCollection, (snapshot) => {
          const list = [];
          snapshot.forEach((doc) => {
            const data = doc.data();
            if (data.roomId === groupId) {
              list.push({ id: doc.id, ...data });
            }
          });
          list.sort((a, b) => b.createdAt - a.createdAt);
          setQuestions(list);
        }, (err) => console.error(err));

        // 2. メンバーリストの取得
        const mCollection = collection(db, 'artifacts', appId, 'public', 'data', 'members');
        const unsubMembers = onSnapshot(mCollection, (snapshot) => {
          const list = [];
          snapshot.forEach((doc) => {
            const data = doc.data();
            if (data.roomId === groupId) {
              list.push({ id: doc.id, ...data });
            }
          });
          setRoomMembers(list);
        }, (err) => console.error(err));

        // 3. アクティビティログの取得
        const aCollection = collection(db, 'artifacts', appId, 'public', 'data', 'activities');
        const unsubActivities = onSnapshot(aCollection, (snapshot) => {
          const list = [];
          snapshot.forEach((doc) => {
            const data = doc.data();
            if (data.roomId === groupId) {
              list.push({ id: doc.id, ...data });
            }
          });
          list.sort((a, b) => b.timestamp - a.timestamp);
          setActivityLog(list.slice(0, 15));
        }, (err) => console.error(err));

        // メンバー登録
        const registerMember = async () => {
          const memberDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'members', `${groupId}_${user.uid}`);
          await setDoc(memberDocRef, {
            uid: user.uid,
            roomId: groupId,
            name: username || `ユーザー_${user.uid.substring(0, 5)}`,
            lastActive: Date.now()
          }, { merge: true });
        };
        registerMember();

        return () => {
          unsubQuestions();
          unsubMembers();
          unsubActivities();
        };
      }, [user, groupId, username]);

      const handleJoinRoom = (e) => {
        e.preventDefault();
        if (!joinRoomInput.trim()) return;
        setGroupId(joinRoomInput.trim());
        showToast(`ルーム「${joinRoomInput.trim()}」に移動しました。`);
        setJoinRoomInput('');
      };

      const copyInviteLink = () => {
        const textToCopy = `${window.location.origin}${window.location.pathname}?room=${groupId}`;
        const tempInput = document.createElement('input');
        tempInput.value = textToCopy;
        document.body.appendChild(tempInput);
        tempInput.select();
        try {
          document.execCommand('copy');
          showToast("招待URLをクリップボードにコピーしました！");
        } catch (err) {
          showToast("コピーに失敗しました", "error");
        }
        document.body.removeChild(tempInput);
      };

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const roomParam = params.get('room');
        if (roomParam) {
          setGroupId(roomParam);
          showToast(`リンクからルーム「${roomParam}」に入室しました。`);
        }
      }, []);

      // --- 問題作成 ---
      const handleCreateQuestion = async (e) => {
        e.preventDefault();
        if (!qTitle.trim()) {
          showToast("問題内容を入力してください。", "error");
          return;
        }

        let correctAnswer = '';
        let optionsList = [];

        if (qType === 'choice') {
          optionsList = qOptions.filter(opt => opt.trim() !== '');
          if (optionsList.length < 2) {
            showToast("選択肢は最低2つ以上入力してください。", "error");
            return;
          }
          correctAnswer = qOptions[qCorrectChoice];
        } else if (qType === 'ox') {
          optionsList = ['O (正しい)', 'X (誤り)'];
          correctAnswer = qCorrectOx;
        } else {
          correctAnswer = qCorrectText.trim();
          if (!correctAnswer) {
            showToast("正解を入力してください。", "error");
            return;
          }
        }

        const newQuestion = {
          roomId: groupId,
          title: qTitle,
          type: qType,
          options: optionsList,
          correctAnswer: correctAnswer,
          explanation: qExplanation,
          creator: username || user.uid.substring(0, 5),
          creatorId: user.uid,
          createdAt: Date.now(),
          intervalDays: parseInt(qInterval) || 1,
          nextReviewDate: Date.now() + (parseInt(qInterval) || 1) * 24 * 60 * 60 * 1000,
          timesReviewed: 0
        };

        try {
          const qCollection = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
          await addDoc(qCollection, newQuestion);
          await addActivity(`新しい問題「${qTitle.substring(0, 10)}...」を追加しました。`);
          showToast("新しい問題を作成しました！");
          
          setQTitle('');
          setQOptions(['', '', '', '']);
          setQCorrectText('');
          setQExplanation('');
          setIsCreateModalOpen(false);
        } catch (err) {
          console.error(err);
          showToast("作成に失敗しました。", "error");
        }
      };

      const handleDeleteQuestion = async (qId, title) => {
        if (!window.confirm(`「${title}」を削除しますか？`)) return;
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'questions', qId);
          await deleteDoc(docRef);
          await addActivity(`問題「${title.substring(0, 10)}...」を削除しました。`);
          showToast("問題を削除しました。");
        } catch (e) {
          showToast("削除に失敗しました。", "error");
        }
      };

      // --- クイズシステム制御 ---
      const startQuiz = () => {
        if (questions.length === 0) {
          showToast("問題がまだありません。", "error");
          return;
        }
        setQuizActive(true);
        setQuizIndex(0);
        setSelectedAnswer(null);
        setTextAnswer('');
        setQuizResults([]);
        setQuizFinished(false);
      };

      const handleAnswerSubmit = (answer) => {
        const currentQ = questions[quizIndex];
        let isCorrect = false;

        if (currentQ.type === 'choice' || currentQ.type === 'ox') {
          isCorrect = answer === currentQ.correctAnswer;
        } else {
          isCorrect = answer.trim().toLowerCase() === currentQ.correctAnswer.trim().toLowerCase();
        }

        setSelectedAnswer(answer);
        setQuizResults([...quizResults, { questionId: currentQ.id, isCorrect }]);
      };

      const nextQuestion = () => {
        setSelectedAnswer(null);
        setTextAnswer('');
        if (quizIndex + 1 < questions.length) {
          setQuizIndex(quizIndex + 1);
        } else {
          setQuizFinished(true);
          updateReminderSchedules();
        }
      };

      const updateReminderSchedules = async () => {
        quizResults.forEach(async (res) => {
          const qObj = questions.find(q => q.id === res.questionId);
          if (!qObj) return;

          let newInterval = qObj.intervalDays || 1;
          newInterval = res.isCorrect ? Math.min(newInterval * 2, 30) : 1;
          const nextDate = Date.now() + newInterval * 24 * 60 * 60 * 1000;

          try {
            const qDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'questions', qObj.id);
            await updateDoc(qDocRef, {
              intervalDays: newInterval,
              nextReviewDate: nextDate,
              timesReviewed: (qObj.timesReviewed || 0) + 1
            });
          } catch (e) {
            console.error(e);
          }
        });
        showToast("復習スケジュールを更新しました！");
      };

      const reviewRequiredQuestions = useMemo(() => {
        const now = Date.now();
        return questions.filter(q => !q.nextReviewDate || q.nextReviewDate <= now);
      }, [questions]);

      const markAsReviewed = async (qId, wasCorrect) => {
        const qObj = questions.find(q => q.id === qId);
        if (!qObj) return;

        let newInterval = wasCorrect ? Math.min((qObj.intervalDays || 1) * 2, 30) : 1;
        const nextDate = Date.now() + newInterval * 24 * 60 * 60 * 1000;

        try {
          const qDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'questions', qId);
          await updateDoc(qDocRef, {
            intervalDays: newInterval,
            nextReviewDate: nextDate,
            timesReviewed: (qObj.timesReviewed || 0) + 1
          });
          showToast(`復習完了！次回の復習は ${newInterval}日後 です。`);
        } catch (e) {
          console.error(e);
        }
      };

      return (
        <div className="flex flex-col min-h-screen">
          {toast && (
            <div className={`fixed top-5 right-5 z-50 px-6 py-3 rounded-xl shadow-xl flex items-center gap-3 border text-white ${
              toast.type === 'error' ? 'bg-rose-500 border-rose-400' : 'bg-emerald-600 border-emerald-500'
            }`}>
              <i className={`fa-solid ${toast.type === 'error' ? 'fa-circle-xmark' : 'fa-circle-check'}`}></i>
              <span className="font-medium text-sm">{toast.message}</span>
            </div>
          )}

          {/* ヘッダー */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-40 px-4 py-3 sm:px-6">
            <div className="max-w-7xl mx-auto flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
              <div className="flex items-center gap-4">
                <div className="bg-indigo-600 text-white p-2.5 rounded-xl shadow-md">
                  <i className="fa-solid fa-graduation-cap text-xl"></i>
                </div>
                <div>
                  <h1 className="text-xl font-bold text-slate-900 flex items-center gap-2">
                    ShareQ <span className="text-xs px-2.5 py-0.5 rounded-full bg-indigo-50 text-indigo-700 font-semibold border border-indigo-100">Beta</span>
                  </h1>
                  <p className="text-xs text-slate-500 mt-0.5">
                    現在のルーム: <strong className="text-indigo-600">{groupId}</strong>
                  </p>
                </div>
              </div>

              <div className="flex flex-wrap items-center gap-3">
                <form onSubmit={handleJoinRoom} className="flex items-center bg-slate-100 rounded-lg p-1 border border-slate-200">
                  <input
                    type="text"
                    placeholder="別のルームID..."
                    className="bg-transparent px-3 py-1 text-xs outline-none w-32 focus:w-40 transition-all font-medium"
                    value={joinRoomInput}
                    onChange={(e) => setJoinRoomInput(e.target.value)}
                  />
                  <button type="submit" className="bg-white hover:bg-slate-50 text-slate-700 p-1.5 rounded-md text-xs font-semibold shadow-sm">移動</button>
                </form>

                <button onClick={copyInviteLink} className="bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 text-indigo-700 px-3 py-1.5 rounded-lg text-xs font-semibold flex items-center gap-1.5 shadow-sm">
                  <i className="fa-solid fa-user-plus"></i>
                  <span>招待リンク</span>
                </button>

                <div className="bg-slate-100 border border-slate-200 rounded-lg px-3 py-1.5 flex items-center gap-2">
                  <i className="fa-solid fa-user text-slate-500 text-xs"></i>
                  <span className="text-xs font-medium text-slate-700 truncate max-w-[120px]">{username || 'ゲスト'}</span>
                  <button onClick={() => setIsSettingUsername(true)} className="text-slate-400 hover:text-indigo-600"><i className="fa-solid fa-pen text-[10px]"></i></button>
                </div>
              </div>
            </div>
          </header>

          {/* ユーザー名変更モーダル */}
          {isSettingUsername && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border">
                <h3 className="text-lg font-bold mb-2">ユーザー名の変更</h3>
                <input
                  type="text"
                  className="w-full px-4 py-2 border rounded-xl mb-4 text-sm"
                  placeholder="ユーザー名..."
                  value={username}
                  onChange={(e) => setUsername(e.target.value)}
                  maxLength={15}
                />
                <div className="flex gap-2 justify-end">
                  <button onClick={() => setIsSettingUsername(false)} className="px-4 py-2 text-xs font-medium text-slate-600">キャンセル</button>
                  <button onClick={handleSaveUsername} className="px-4 py-2 text-xs font-bold text-white bg-indigo-600 rounded-lg">保存する</button>
                </div>
              </div>
            </div>
          )}

          {/* メインレイアウト */}
          <main className="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div className="lg:col-span-1 flex flex-col gap-6">
              <div className="bg-white rounded-2xl border p-3 shadow-sm">
                <p className="text-[11px] font-bold text-slate-400 uppercase px-3 mb-2">メニュー</p>
                <nav className="space-y-1">
                  <button onClick={() => { setActiveTab('dashboard'); setQuizActive(false); }} className={`w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-sm font-semibold ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-50'}`}>
                    <span><i className="fa-solid fa-gauge-high mr-2"></i>ダッシュボード</span>
                  </button>
                  <button onClick={() => { setActiveTab('questions'); setQuizActive(false); }} className={`w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-sm font-semibold ${activeTab === 'questions' ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-50'}`}>
                    <span><i className="fa-solid fa-list-check mr-2"></i>問題一覧・作成</span>
                    <span className={`text-xs px-2 py-0.5 rounded-full ${activeTab === 'questions' ? 'bg-indigo-500 text-white' : 'bg-slate-100'}`}>{questions.length}</span>
                  </button>
                  <button onClick={() => { setActiveTab('reminders'); setQuizActive(false); }} className={`w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-sm font-semibold ${activeTab === 'reminders' ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-50'}`}>
                    <span><i className="fa-solid fa-clock-rotate-left mr-2"></i>今日の復習</span>
                    {reviewRequiredQuestions.length > 0 && <span className="bg-amber-500 text-white text-[10px] px-1.5 py-0.5 rounded-full animate-bounce">{reviewRequiredQuestions.length}</span>}
                  </button>
                  <button onClick={() => { setActiveTab('members'); setQuizActive(false); }} className={`w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-sm font-semibold ${activeTab === 'members' ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-50'}`}>
                    <span><i className="fa-solid fa-users mr-2"></i>メンバー</span>
                  </button>
                </nav>
                <div className="border-t mt-4 pt-4 px-3">
                  <button onClick={startQuiz} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 rounded-xl text-sm font-bold shadow-md flex items-center justify-center gap-2">
                    <i className="fa-solid fa-play text-xs"></i>全員分のクイズに挑戦
                  </button>
                </div>
              </div>
            </div>

            {/* コンテンツ表示エリア */}
            <div className="lg:col-span-3 flex flex-col gap-6">
              {quizActive ? (
                <div className="bg-white rounded-2xl border p-6 shadow-md">
                  <div className="flex items-center justify-between border-b pb-4 mb-6">
                    <span className="bg-indigo-100 text-indigo-800 text-xs px-2.5 py-1 rounded-full font-bold">問題 {quizIndex + 1} / {questions.length}</span>
                    <button onClick={() => setQuizActive(false)} className="text-slate-400 hover:text-rose-600 text-sm"><i className="fa-solid fa-xmark mr-1"></i>中断</button>
                  </div>

                  {!quizFinished ? (
                    <div>
                      <h2 className="text-xl font-bold mb-6">{questions[quizIndex]?.title}</h2>
                      <div className="mb-6">
                        {questions[quizIndex]?.type === 'choice' && (
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            {questions[quizIndex]?.options.map((opt, oIdx) => (
                              <button key={oIdx} disabled={selectedAnswer !== null} onClick={() => handleAnswerSubmit(opt)} className={`w-full p-4 rounded-xl border-2 text-left text-sm transition ${selectedAnswer ? (opt === questions[quizIndex].correctAnswer ? 'bg-emerald-50 border-emerald-500 text-emerald-800' : 'opacity-50') : 'hover:bg-slate-50'}`}>
                                {opt}
                              </button>
                            ))}
                          </div>
                        )}
                        {questions[quizIndex]?.type === 'ox' && (
                          <div className="grid grid-cols-2 gap-4">
                            {['O', 'X'].map((ox) => (
                              <button key={ox} disabled={selectedAnswer !== null} onClick={() => handleAnswerSubmit(ox)} className={`py-6 border-2 rounded-2xl font-bold text-2xl ${selectedAnswer ? (ox === questions[quizIndex].correctAnswer ? 'bg-emerald-50 border-emerald-500' : 'opacity-50') : 'hover:bg-slate-50'}`}>
                                {ox}
                              </button>
                            ))}
                          </div>
                        )}
                        {questions[quizIndex]?.type === 'text' && (
                          <div>
                            {selectedAnswer === null ? (
                              <div className="flex gap-2">
                                <input type="text" className="flex-1 px-4 py-3 border-2 rounded-xl text-sm" placeholder="解答を入力..." value={textAnswer} onChange={(e) => setTextAnswer(e.target.value)} />
                                <button onClick={() => handleAnswerSubmit(textAnswer)} className="bg-indigo-600 text-white px-6 rounded-xl text-sm font-bold">決定</button>
                              </div>
                            ) : (
                              <div className="p-4 bg-slate-50 rounded-xl text-sm">
                                <p>あなたの回答: <strong>{selectedAnswer}</strong></p>
                                <p className="mt-2 text-emerald-600">正解: <strong>{questions[quizIndex].correctAnswer}</strong></p>
                              </div>
                            )}
                          </div>
                        )}
                      </div>

                      {selectedAnswer !== null && (
                        <div className="mt-6 pt-6 border-t">
                          {questions[quizIndex]?.explanation && <p className="text-xs text-slate-500 bg-slate-50 p-3 rounded-lg mb-4">{questions[quizIndex].explanation}</p>}
                          <button onClick={nextQuestion} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">次へ</button>
                        </div>
                      )}
                    </div>
                  ) : (
                    <div className="text-center py-8">
                      <h3 className="text-2xl font-black mb-2">クイズ完了！</h3>
                      <p className="text-sm text-slate-500 mb-6">正解数: {quizResults.filter(r => r.isCorrect).length} / {questions.length}</p>
                      <button onClick={() => setQuizActive(false)} className="bg-indigo-600 text-white px-6 py-2 rounded-xl text-sm font-bold">ダッシュボードへ戻る</button>
                    </div>
                  )}
                </div>
              ) : (
                <div>
                  {activeTab === 'dashboard' && (
                    <div className="space-y-6">
                      <div className="bg-gradient-to-r from-indigo-600 to-purple-800 rounded-3xl text-white p-6 shadow-xl">
                        <h2 className="text-2xl font-black mb-2">友達と問題を共有して学ぼう</h2>
                        <p className="text-sm opacity-90 mb-6">作成した問題は即座にルーム内の全員に自動同期されます。</p>
                        <div className="flex gap-3">
                          <button onClick={() => setIsCreateModalOpen(true)} className="bg-white text-indigo-900 px-4 py-2 rounded-xl text-xs font-bold shadow"><i className="fa-solid fa-plus mr-1"></i>問題作成</button>
                          <button onClick={startQuiz} className="bg-emerald-500 text-white px-4 py-2 rounded-xl text-xs font-bold shadow"><i className="fa-solid fa-play mr-1"></i>クイズ開始</button>
                        </div>
                      </div>

                      <div className="bg-white rounded-2xl border p-5 shadow-sm">
                        <h3 className="text-sm font-bold mb-4"><i className="fa-solid fa-wave-square text-indigo-600 mr-2"></i>活動ログ</h3>
                        <div className="space-y-3 max-h-48 overflow-y-auto custom-scrollbar">
                          {activityLog.length === 0 ? <p className="text-xs text-slate-400">
