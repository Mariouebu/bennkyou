<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareQ - 友達と問題作成・リマインダー</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"
      }
    }
  </script>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "firebase/firestore";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";

    // --- Firebase 設定 (ご自身のキーに書き換えてください) ---
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY_HERE",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // グローバル変数の宣言
    let db = null;
    let auth = null;
    let firebaseInitialized = false;

    // 白画面対策：Firebaseの初期化に失敗してもReactがクラッシュしないようにガード
    try {
      if (firebaseConfig.apiKey && !firebaseConfig.apiKey.includes("YOUR_")) {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        auth = getAuth(app);
        firebaseInitialized = true;
        console.log("Firebase initialized successfully.");
      } else {
        console.warn("Firebase config is placeholder. Running in Offline Mock Mode.");
      }
    } catch (error) {
      console.error("Firebase initialization failed:", error);
    }

    // React Hooks の取得
    const { useState, useEffect } = React;

    function App() {
      // 状態管理
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [questions, setQuestions] = useState([]);
      const [loading, setLoading] = useState(false);
      
      // 新規問題フォームの状態
      const [title, setTitle] = useState('');
      const [type, setType] = useState('choice');
      const [options, setOptions] = useState(['', '', '', '']);
      const [correctAnswer, setCorrectAnswer] = useState('');

      // 1. ログイン処理 (Firebase or ゲスト)
      useEffect(() => {
        if (firebaseInitialized && auth) {
          // 匿名ログインを実行
          signInAnonymously(auth).catch(err => console.error("Auth error:", err));
          
          // ログイン状態の監視
          const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
            if (currentUser) {
              setUser(currentUser);
              fetchQuestions(currentUser.uid);
            }
          });
          return () => unsubscribe();
        } else {
          // Firebaseがない場合はローカルの模擬ユーザー
          setUser({ uid: "mock-user-123", isAnonymous: true });
          setQuestions([
            { id: "1", title: "サンプルのクイズ：日本で一番高い山は？", type: "choice", options: ["富士山", "北岳", "奥穂高岳", "間ノ岳"], correctAnswer: "富士山" }
          ]);
        }
      }, []);

      // 2. 問題一覧の取得
      const fetchQuestions = async (uid) => {
        if (!firebaseInitialized || !db) return;
        setLoading(true);
        try {
          const q = query(collection(db, "questions"), orderBy("createdAt", "desc"));
          const querySnapshot = await getDocs(q);
          const list = [];
          querySnapshot.forEach((doc) => {
            list.push({ id: doc.id, ...doc.data() });
          });
          setQuestions(list);
        } catch (error) {
          console.error("Error fetching questions:", error);
        } finally {
          setLoading(false);
        }
      };

      // 3. 問題の追加
      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!title.trim()) return alert("問題文を入力してください");

        const newQuestion = {
          title,
          type,
          options: type === 'choice' ? options.filter(o => o.trim() !== '') : [],
          correctAnswer: type === 'choice' ? correctAnswer : (correctAnswer === 'true'),
          userId: user?.uid || "anonymous",
          createdAt: new Date().toISOString()
        };

        if (firebaseInitialized && db) {
          try {
            await addDoc(collection(db, "questions"), newQuestion);
            fetchQuestions(user.uid);
            resetForm();
            setActiveTab('questions');
          } catch (error) {
            console.error("Error adding document: ", error);
            alert("保存に失敗しました。");
          }
        } else {
          // オフライン時のローカル追加
          setQuestions([{ id: Date.now().toString(), ...newQuestion }, ...questions]);
          resetForm();
          setActiveTab('questions');
        }
      };

      const resetForm = () => {
        setTitle('');
        setOptions(['', '', '', '']);
        setCorrectAnswer('');
      };

      return (
        <div className="flex flex-col min-h-screen">
          {/* ヘッダー */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
              <div className="flex items-center space-x-3">
                <div className="bg-indigo-600 text-white p-2 rounded-xl shadow-md shadow-indigo-100">
                  <i className="fa-solid fa-graduation-cap text-lg"></i>
                </div>
                <span className="text-xl font-bold tracking-tight bg-gradient-to-r block bg-clip-text text-transparent from-indigo-600 to-violet-600">ShareQ</span>
              </div>
              <div className="flex items-center space-x-3">
                {firebaseInitialized ? (
                  <span className="bg-emerald-50 text-emerald-700 border border-emerald-200 text-xs px-3 py-1.5 rounded-full font-medium flex items-center gap-1.5">
                    <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Cloud Connected
                  </span>
                ) : (
                  <span className="bg-amber-50 text-amber-700 border border-amber-200 text-xs px-3 py-1.5 rounded-full font-medium flex items-center gap-1.5">
                    <span className="w-2 h-2 rounded-full bg-amber-400"></span> Local Demo Mode
                  </span>
                )}
              </div>
            </div>
          </header>

          {/* メインレイアウト */}
          <div className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col md:flex-row gap-8">
            
            {/* サイドナビゲーション */}
            <nav className="w-full md:w-64 flex flex-row md:flex-col gap-2 h-fit">
              <button 
                onClick={() => setActiveTab('dashboard')} 
                className={`flex-1 md:flex-initial flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-600 hover:bg-slate-100'}`}
              >
                <i className="fa-solid fa-house w-5"></i> ダッシュボード
              </button>
              <button 
                onClick={() => setActiveTab('create')} 
                className={`flex-1 md:flex-initial flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === 'create' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-600 hover:bg-slate-100'}`}
              >
                <i className="fa-solid fa-plus w-5"></i> 問題を作る
              </button>
              <button 
                onClick={() => setActiveTab('questions')} 
                className={`flex-1 md:flex-initial flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === 'questions' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-600 hover:bg-slate-100'}`}
              >
                <i className="fa-solid fa-list w-5"></i> 問題一覧 ({questions.length})
              </button>
            </nav>

            {/* メインコンテンツエリア */}
            <main className="flex-1 bg-white border border-slate-200 rounded-2xl p-6 shadow-sm min-h-[400px]">
              
              {/* --- タブ1: ダッシュボード --- */}
              {activeTab === 'dashboard' && (
                <div className="space-y-6">
                  <div>
                    <h2 className="text-xl font-bold text-slate-900">こんにちは！👋</h2>
                    <p className="text-slate-500 text-sm mt-1">ShareQ で友達と効率よく問題を共有・復習しましょう。</p>
                  </div>

                  {!firebaseInitialized && (
                    <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 flex gap-3 text-amber-800 text-sm">
                      <i className="fa-solid fa-triangle-exclamation text-lg mt-0.5"></i>
                      <div>
                        <p className="font-bold">Firebase 設定が未完了です</p>
                        <p className="mt-0.5 text-amber-700">コード内の `firebaseConfig` を書き換えるまで、作成した問題はブラウザを閉じると消去されます（デモ動作）。</p>
                      </div>
                    </div>
                  )}

                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div className="border border-slate-200 rounded-xl p-5 bg-slate-50">
                      <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">総作成問題数</span>
                      <p className="text-3xl font-bold text-slate-800 mt-2">{questions.length} <span className="text-sm font-normal text-slate-500">問</span></p>
                    </div>
                    <div className="border border-slate-200 rounded-xl p-5 bg-slate-50">
                      <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">次回のリマインダー</span>
                      <p className="text-sm font-medium text-slate-600 mt-3"><i className="fa-regular fa-clock mr-1.5 text-indigo-500"></i>設定されていません</p>
                    </div>
                  </div>
                </div>
              )}

              {/* --- タブ2: 問題の新規作成 --- */}
              {activeTab === 'create' && (
                <div className="space-y-6">
                  <h2 className="text-xl font-bold text-slate-900">新しい問題の作成</h2>
                  
                  <form onSubmit={handleSubmit} className="space-y-5">
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-2">問題文</label>
                      <input 
                        type="text" 
                        value={title} 
                        onChange={(e) => setTitle(e.target.value)}
                        placeholder="例: 日本で一番高い山の名前は？"
                        className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-2">出題形式</label>
                      <div className="flex gap-4">
                        <label className="flex items-center gap-2 text-sm font-medium text-slate-600 cursor-pointer">
                          <input type="radio" checked={type === 'choice'} onChange={() => setType('choice')} className="text-indigo-600 focus:ring-indigo-500" />
                          4択クイズ
                        </label>
                        <label className="flex items-center gap-2 text-sm font-medium text-slate-600 cursor-pointer">
                          <input type="radio" checked={type === 'boolean'} onChange={() => setType('boolean')} className="text-indigo-600 focus:ring-indigo-500" />
                          ○✕問題
                        </label>
                      </div>
                    </div>

                    {type === 'choice' ? (
                      <div className="space-y-3">
                        <label className="block text-sm font-semibold text-slate-700">選択肢と解答の指定</label>
                        {options.map((option, i) => (
                          <div key={i} className="flex items-center gap-3">
                            <span className="text-xs font-bold text-slate-400 bg-slate-100 w-6 h-6 rounded-full flex items-center justify-center">{i + 1}</span>
                            <input 
                              type="text" 
                              value={option} 
                              onChange={(e) => {
                                const newOpts = [...options];
                                newOpts[i] = e.target.value;
                                setOptions(newOpts);
                              }}
                              placeholder={`選択肢 ${i + 1}`}
                              className="flex-1 px-4 py-2 rounded-xl border border-slate-300 text-sm outline-none focus:ring-2 focus:ring-indigo-500"
                            />
                            <button 
                              type="button"
                              onClick={() => setCorrectAnswer(option)}
                              className={`px-3 py-2 text-xs font-bold rounded-lg border transition-all ${correctAnswer === option && option !== '' ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-white text-slate-500 hover:bg-slate-50'}`}
                            >
                              {correctAnswer === option && option !== '' ? '正解' : '正解にする'}
                            </button>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div>
                        <label className="block text-sm font-semibold text-slate-700 mb-2">正解の選択</label>
                        <div className="flex gap-3">
                          <button 
                            type="button" 
                            onClick={() => setCorrectAnswer('true')}
                            className={`flex-1 py-3 font-bold rounded-xl border transition-all ${correctAnswer === 'true' ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-slate-50 text-slate-600 hover:bg-slate-100'}`}
                          >
                            ⭕ 正解は「○」
                          </button>
                          <button 
                            type="button" 
                            onClick={() => setCorrectAnswer('false')}
                            className={`flex-1 py-3 font-bold rounded-xl border transition-all ${correctAnswer === 'false' ? 'bg-rose-500 text-white border-rose-500' : 'bg-slate-50 text-slate-600 hover:bg-slate-100'}`}
                          >
                            ❌ 正解は「✕」
                          </button>
                        </div>
                      </div>
                    )}

                    <button 
                      type="submit"
                      className="w-full bg-indigo-600 text-white font-semibold py-3 rounded-xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all text-sm mt-4"
                    >
                      問題を作成して保存
                    </button>
                  </form>
                </div>
              )}

              {/* --- タブ3: 問題一覧 --- */}
              {activeTab === 'questions' && (
                <div className="space-y-6">
                  <h2 className="text-xl font-bold text-slate-900">登録された問題</h2>

                  {loading ? (
                    <div className="text-center py-8 text-slate-400 text-sm">
                      <i className="fa-solid fa-spinner animate-spin mr-2"></i> 読み込み中...
                    </div>
                  ) : questions.length === 0 ? (
                    <div className="text-center py-12 text-slate-400 text-sm border-2 border-dashed border-slate-200 rounded-2xl">
                      問題がありません。「問題を作る」タブから作成してください。
                    </div>
                  ) : (
                    <div className="grid grid-cols-1 gap-4">
                      {questions.map((q) => (
                        <div key={q.id} className="p-5 border border-slate-200 rounded-2xl bg-slate-50/50 hover:bg-slate-50 transition-all">
                          <div className="flex items-center gap-2 mb-2">
                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${q.type === 'choice' ? 'bg-indigo-50 text-indigo-700 border border-indigo-100' : 'bg-purple-50 text-purple-700 border border-purple-100'}`}>
                              {q.type === 'choice' ? '4択クイズ' : '○✕問題'}
                            </span>
                          </div>
                          <h4 className="font-bold text-slate-800 text-base">{q.title}</h4>
                          
                          {q.type === 'choice' && q.options && (
                            <div className="grid grid-cols-2 gap-2 mt-3">
                              {q.options.map((opt, idx) => (
                                <div key={idx} className={`p-2.5 rounded-xl text-xs font-medium border ${opt === q.correctAnswer ? 'bg-emerald-50 text-emerald-800 border-emerald-200 font-bold' : 'bg-white text-slate-600'}`}>
                                  {opt} {opt === q.correctAnswer && '✅'}
                                </div>
                              ))}
                            </div>
                          )}

                          {q.type === 'boolean' && (
                            <p className="mt-2 text-xs text-slate-500 font-medium">
                              正解: <span className="font-bold text-emerald-600">{q.correctAnswer === true || q.correctAnswer === 'true' ? '⭕ ○' : '❌ ✕'}</span>
                            </p>
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}

            </main>
          </div>
        </div>
      );
    }

    // Reactアプリのレンダリング起動
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
