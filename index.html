<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareQ - AI採点＆セキュリティ管理画面付き</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>body { font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBeNYgJzq7fDRSHHJKYmYaae0PtLg3J91s",
      authDomain: "shareq-b6483.firebaseapp.com",
      projectId: "shareq-b6483",
      storageBucket: "shareq-b6483.firebasestorage.app",
      messagingSenderId: "1006700920095",
      appId: "1:1006700920095:web:16b93980001ff68f45442a"
    };

    let db = null; let auth = null; let firebaseInitialized = false;
    try {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app); auth = getAuth(app);
      firebaseInitialized = true;
    } catch (e) { console.error(e); }

    // --- Gemini AI無料呼び出し関数 ---
    async function askAI(promptText) {
      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${firebaseConfig.apiKey}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
        });
        const data = await response.json();
        return data.candidates[0].content.parts[0].text;
      } catch (error) {
        console.error("AI思考エラー:", error);
        return "AIサーバーが混雑しています。もう一度お試しください。";
      }
    }

    const { useState, useEffect } = React;

    // 🔒 管理者用ログインパスワード
    const ADMIN_PASSWORD = "Haya1012";

    function App() {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [questions, setQuestions] = useState([]);
      const [reminders, setReminders] = useState([]);
      const [adminQuestions, setAdminQuestions] = useState([]);
      const [meetLogs, setMeetLogs] = useState([]); 
      const [availableRooms, setAvailableRooms] = useState([]); // 作成済みルーム一覧

      // 管理者ログイン状態
      const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
      const [passwordInput, setPasswordInput] = useState('');
      const [loginError, setLoginError] = useState('');

      // ルーム＆選択状態
      const [currentRoom, setCurrentRoom] = useState(null);
      const [roomInput, setRoomInput] = useState('');
      const [meetLinkInput, setMeetLinkInput] = useState(''); 
      const [currentMeetLink, setCurrentMeetLink] = useState(''); 
      const [selectedAnswers, setSelectedAnswers] = useState({});
      const [aiExplanations, setAiExplanations] = useState({});
      const [aiLoading, setAiLoading] = useState({});

      // 各種フォーム
      const [title, setTitle] = useState('');
      const [type, setType] = useState('choice');
      const [options, setOptions] = useState(['', '', '', '']);
      const [correctAnswer, setCorrectAnswer] = useState('');
      const [remText, setRemText] = useState('');
      const [remTime, setRemTime] = useState('');
      const [editingRemId, setEditingRemId] = useState(null);
      const [userQuestion, setUserQuestion] = useState('');
      const [aiChatResponse, setAiChatResponse] = useState('');
      const [chatLoading, setChatLoading] = useState(false);

      const [nickname, setNickname] = useState(() => localStorage.getItem('shareq_name') || `ゲスト_${Math.floor(1000 + Math.random() * 9000)}`);

      useEffect(() => {
        localStorage.setItem('shareq_name', nickname);
      }, [nickname]);

      useEffect(() => {
        if (firebaseInitialized && auth) {
          signInAnonymously(auth).catch(console.error);
          onAuthStateChanged(auth, (currentUser) => {
            if (currentUser) {
              setUser(currentUser);
              onSnapshot(query(collection(db, "questions"), orderBy("createdAt", "desc")), (snap) => {
                setQuestions(snap.docs.map(d => ({id: d.id, ...d.data()})));
              });
              onSnapshot(query(collection(db, "reminders"), orderBy("time", "asc")), (snap) => {
                setReminders(snap.docs.map(d => ({id: d.id, ...d.data()})));
              });
              onSnapshot(query(collection(db, "admin_escalations"), orderBy("createdAt", "desc")), (snap) => {
                setAdminQuestions(snap.docs.map(d => ({id: d.id, ...d.data()})));
              });
              onSnapshot(query(collection(db, "meet_logs"), orderBy("timestamp", "desc")), (snap) => {
                setMeetLogs(snap.docs.map(d => ({id: d.id, ...d.data()})));
              });
              
              // リアルタイムに作成済みのルーム一覧を取得（エラー検知付き）
              onSnapshot(query(collection(db, "rooms"), orderBy("createdAt", "desc")), 
                (snap) => {
                  setAvailableRooms(snap.docs.map(d => ({id: d.id, ...d.data()})));
                },
                (error) => {
                  console.error("ルーム一覧取得エラー:", error);
                  // インデックス未作成エラーの場合、コンソールに生成用リンクが出ます
                }
              );
            }
          });
        }
      }, []);

      // ルームのMeetリンクのリアルタイム監視
      useEffect(() => {
        if (!currentRoom || !db) return;
        const unsub = onSnapshot(doc(db, "rooms", currentRoom), (docSnap) => {
          if (docSnap.exists()) {
            setCurrentMeetLink(docSnap.data().meetLink || '');
          } else {
            setCurrentMeetLink('');
          }
        });
        return () => unsub();
      }, [currentRoom]);

      // 管理者ログイン
      const handleAdminLogin = (e) => {
        e.preventDefault();
        if (passwordInput === ADMIN_PASSWORD) {
          setIsAdminAuthenticated(true);
          setLoginError('');
          setPasswordInput('');
        } else {
          setLoginError('❌ パスワードが正しくありません。');
        }
      };

      // 管理者ログアウト
      const handleAdminLogout = () => {
        setIsAdminAuthenticated(false);
        setActiveTab('dashboard');
      };

      // 問題追加
      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!title.trim()) return alert("問題文を入力してください");
        if (type === 'choice' && !correctAnswer) return alert("正解の選択肢を選んでください");

        await addDoc(collection(db, "questions"), {
          title, type, options: type === 'choice' ? options.filter(o => o.trim() !== '') : [],
          correctAnswer: type === 'choice' ? correctAnswer : (correctAnswer === 'true'),
          createdAt: new Date().toISOString(), room: currentRoom
        });
        setTitle(''); setOptions(['', '', '', '']); setCorrectAnswer('');
        setActiveTab('questions');
      };

      // AI採点
      const handleAnswerQuiz = async (qId, selectedOpt, correctOpt) => {
        setSelectedAnswers(prev => ({ ...prev, [qId]: selectedOpt }));
        setAiLoading(prev => ({ ...prev, [qId]: true }));
        const targetQuestion = questions.find(q => q.id === qId);
        const isCorrect = String(selectedOpt) === String(correctOpt);

        const aiPrompt = `
          あなたは優秀な家庭教師AIです。生徒がクイズに挑戦しました。
          問題: "${targetQuestion.title}"
          生徒の回答: "${selectedOpt}"
          正しい正解: "${correctOpt}"
          結果: ${isCorrect ? "正解" : "不正解"}
          生徒に向けて解説と、楽しく学べる豆知識を200文字程度で優しく教えてあげてください。
        `;
        const explanation = await askAI(aiPrompt);
        setAiExplanations(prev => ({ ...prev, [qId]: explanation }));
        setAiLoading(prev => ({ ...prev, [qId]: false }));
      };

      // AI質問箱
      const handleAskAIBox = async (e) => {
        e.preventDefault();
        if (!userQuestion.trim()) return;
        setChatLoading(true); setAiChatResponse('');

        const aiPrompt = `
          ユーザーから学習に関する質問を受けました。 質問: "${userQuestion}"
          【ルール】 もしこの質問が高度すぎる、専門外である、またはあなた(AI)が「正確に答えられない・わからない」と判断した場合は、必ず文章の最初に「【管理者エスカレーション】」とだけ書いて改行し、その後ろに管理者へ送るための理由を書いてください。 普通に答えられる場合は、親切に回答を教えてください。
        `;
        const response = await askAI(aiPrompt);
        
        if (response.includes("【管理者エスカレーション】")) {
          await addDoc(collection(db, "admin_escalations"), {
            question: userQuestion, status: "未対応", createdAt: new Date().toISOString()
          });
          setAiChatResponse("🤖 AI判定: 「この質問は少し難しいため、正確な回答のために管理者の先生にバトンタッチしました！管理画面に送信されました。」");
        } else {
          setAiChatResponse(response);
        }
        setChatLoading(false);
      };

      // リマインダー
      const handleReminderSubmit = async (e) => {
        e.preventDefault();
        if (!remText.trim() || !remTime) return;
        if (editingRemId) {
          await updateDoc(doc(db, "reminders", editingRemId), { text: remText, time: remTime });
          setEditingRemId(null);
        } else {
          await addDoc(collection(db, "reminders"), { text: remText, time: remTime, createdAt: new Date().toISOString() });
        }
        setRemText(''); setRemTime('');
      };

      // Google Meetを開いた時のログ取得機能
      const handleOpenMeet = async () => {
        if (!currentMeetLink) return;
        await addDoc(collection(db, "meet_logs"), {
          user: nickname, room: currentRoom, meetLink: currentMeetLink, timestamp: new Date().toISOString()
        });
        window.open(currentMeetLink, '_blank');
      };

      return (
        <div className="flex flex-col min-h-screen">
          <header className="bg-white border-b border-slate-200 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
              <div className="flex items-center space-x-3">
                <div className="bg-indigo-600 text-white p-2 rounded-xl shadow-md"><i className="fa-solid fa-graduation-cap"></i></div>
                <span className="text-xl font-bold bg-gradient-to-r bg-clip-text text-transparent from-indigo-600 to-violet-600">ShareQ AI</span>
              </div>
              
              <div className="flex items-center space-x-4">
                <div className="flex items-center gap-1 bg-slate-100 px-3 py-1 rounded-xl text-xs">
                  <span className="text-slate-500">名前:</span>
                  <input type="text" value={nickname} onChange={e => setNickname(e.target.value)} className="bg-transparent font-bold text-slate-700 w-24 border-b border-transparent focus:border-indigo-500 outline-none" title="管理画面にこの名前で表示されます" />
                </div>
                {currentRoom && <span className="bg-indigo-50 text-indigo-700 text-xs px-3 py-1.5 rounded-full font-bold"><i className="fa-solid fa-door-open mr-1"></i> {currentRoom}</span>}
                <span className="bg-emerald-50 text-emerald-700 border border-emerald-200 text-xs px-3 py-1.5 rounded-full font-medium flex items-center gap-1.5">
                  <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Cloud Connected
                </span>
              </div>
            </div>
          </header>

          <div className="flex-1 max-w-7xl w-full mx-auto px-4 py-8 flex flex-col md:flex-row gap-8">
            <nav className="w-full md:w-64 flex flex-row md:flex-col gap-2 h-fit">
              <button onClick={() => setActiveTab('dashboard')} className={`flex-1 md:flex-initial flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-600 hover:bg-slate-100'}`}><i className="fa-solid fa-house w-5"></i> ダッシュボード</button>
              <button onClick={() => setActiveTab('create')} className={`flex-1 md:flex-initial flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium ${activeTab === 'create' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-600 hover:bg-slate-100'}`}><i className="fa-solid fa-plus w-5"></i> 問題を作る</button>
              <button onClick={() => setActiveTab('questions')} className={`flex-1 md:flex-initial flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium ${activeTab === 'questions' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-600 hover:bg-slate-100'}`}><i className="fa-solid fa-list w-5"></i> 問題一覧・AI採点</button>
              <button onClick={() => setActiveTab('ai-chat')} className={`flex-1 md:flex-initial flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium ${activeTab === 'ai-chat' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-600 hover:bg-slate-100'}`}><i className="fa-solid fa-robot w-5"></i> AI質問箱</button>
              <button onClick={() => setActiveTab('room')} className={`flex-1 md:flex-initial flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium ${activeTab === 'room' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-600 hover:bg-slate-100'}`}><i className="fa-solid fa-users w-5"></i> ルーム会議 ({availableRooms.length})</button>
              <button onClick={() => setActiveTab('admin')} className={`flex-1 md:flex-initial flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium ${activeTab === 'admin' ? 'bg-slate-800 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-100'}`}><i className="fa-solid fa-lock w-5"></i> 管理画面 ({adminQuestions.length + meetLogs.length})</button>
            </nav>

            <main className="flex-1 bg-white border border-slate-200 rounded-2xl p-6 shadow-sm min-h-[400px]">
              
              {/* ダッシュボード */}
              {activeTab === 'dashboard' && (
                <div className="space-y-6">
                  <div>
                    <h2 className="text-xl font-bold text-slate-900">ダッシュボード</h2>
                    <p className="text-slate-500 text-sm">スケジュールの管理や進捗を確認できます。</p>
                  </div>
                  <form onSubmit={handleReminderSubmit} className="bg-slate-50 p-4 rounded-xl border flex flex-col sm:flex-row gap-3">
                    <input type="text" value={remText} onChange={e => setRemText(e.target.value)} placeholder="予定・リマインダー内容" className="flex-1 px-3 py-2 text-sm rounded-lg border outline-none focus:ring-2 focus:ring-indigo-500" required />
                    <input type="datetime-local" value={remTime} onChange={e => setRemTime(e.target.value)} className="px-3 py-2 text-sm rounded-lg border outline-none focus:ring-2 focus:ring-indigo-500" required />
                    <button type="submit" className="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold">{editingRemId ? '更新' : '追加'}</button>
                  </form>
                  <div className="space-y-2">
                    {reminders.map(rem => (
                      <div key={rem.id} className="flex justify-between items-center p-3 border rounded-xl bg-white shadow-sm">
                        <div><p className="text-sm font-bold">{rem.text}</p><p className="text-xs text-indigo-600">{rem.time.replace('T', ' ')}</p></div>
                        <div className="flex gap-2">
                          <button onClick={() => { setEditingRemId(rem.id); setRemText(rem.text); setRemTime(rem.time); }} className="text-slate-400 hover:text-indigo-600 text-sm"><i className="fa-solid fa-pen"></i></button>
                          <button onClick={() => deleteDoc(doc(db, "reminders", rem.id))} className="text-slate-400 hover:text-rose-600 text-sm"><i className="fa-solid fa-trash"></i></button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* 問題の新規作成 */}
              {activeTab === 'create' && (
                <div className="space-y-6">
                  <h2 className="text-xl font-bold text-slate-900">新しい問題の作成 {currentRoom && `(Room: ${currentRoom})`}</h2>
                  <form onSubmit={handleSubmit} className="space-y-5">
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-2">問題文</label>
                      <input type="text" value={title} onChange={(e) => setTitle(e.target.value)} placeholder="例: 日本で一番大きい湖は？" className="w-full px-4 py-2.5 rounded-xl border outline-none focus:ring-2 focus:ring-indigo-500" />
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-2">形式</label>
                      <div className="flex gap-4">
                        <label className="flex items-center gap-2 cursor-pointer"><input type="radio" checked={type === 'choice'} onChange={() => setType('choice')} /> 4択クイズ</label>
                        <label className="flex items-center gap-2 cursor-pointer"><input type="radio" checked={type === 'boolean'} onChange={() => setType('boolean')} /> ○✕問題</label>
                      </div>
                    </div>
                    {type === 'choice' ? (
                      <div className="space-y-3">
                        <label className="block text-sm font-semibold text-slate-700">選択肢</label>
                        {options.map((option, i) => (
                          <div key={i} className="flex items-center gap-2">
                            <input type="text" value={option} onChange={(e) => { const n = [...options]; n[i] = e.target.value; setOptions(n); }} placeholder={`選択肢 ${i+1}`} className="flex-1 px-4 py-2 border rounded-xl" />
                            <button type="button" onClick={() => setCorrectAnswer(option)} className={`px-3 py-2 text-xs font-bold rounded-lg border ${correctAnswer === option && option !== '' ? 'bg-emerald-500 text-white' : 'bg-white text-slate-500'}`}>正解にする</button>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="flex gap-3">
                        <button type="button" onClick={() => setCorrectAnswer('true')} className={`flex-1 py-3 font-bold rounded-xl border ${correctAnswer === 'true' ? 'bg-emerald-500 text-white' : 'bg-slate-50'}`}>⭕ ○</button>
                        <button type="button" onClick={() => setCorrectAnswer('false')} className={`flex-1 py-3 font-bold rounded-xl border ${correctAnswer === 'false' ? 'bg-rose-500 text-white' : 'bg-slate-50'}`}>❌ ✕</button>
                      </div>
                    )}
                    <button type="submit" className="w-full bg-indigo-600 text-white font-semibold py-3 rounded-xl shadow-lg hover:bg-indigo-700">問題を保存して公開</button>
                  </form>
                </div>
              )}

              {/* 問題一覧 ＆ AI採点 */}
              {activeTab === 'questions' && (
                <div className="space-y-6">
                  <h2 className="text-xl font-bold text-slate-900">問題一覧とAI即時採点</h2>
                  <div className="grid grid-cols-1 gap-4">
                    {questions.filter(q => !currentRoom || q.room === currentRoom).map((q) => (
                      <div key={q.id} className="p-5 border border-slate-200 rounded-2xl bg-slate-50/50">
                        <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-indigo-50 text-indigo-700 border mb-2 inline-block">{q.type === 'choice' ? '4択クイズ' : '○✕問題'}</span>
                        <h4 className="font-bold text-slate-800 text-base mb-3">{q.title}</h4>
                        <div className="grid grid-cols-2 gap-2">
                          {q.type === 'choice' ? q.options.map((opt, idx) => (
                            <button key={idx} onClick={() => handleAnswerQuiz(q.id, opt, q.correctAnswer)} className={`p-3 rounded-xl text-xs text-left border font-medium ${selectedAnswers[q.id] === opt ? 'bg-indigo-600 text-white' : 'bg-white hover:bg-slate-100'}`}>{opt}</button>
                          )) : (
                            <>
                              <button onClick={() => handleAnswerQuiz(q.id, 'true', q.correctAnswer)} className={`p-3 rounded-xl text-xs border font-medium ${selectedAnswers[q.id] === 'true' ? 'bg-indigo-600 text-white' : 'bg-white'}`}>⭕ ○</button>
                              <button onClick={() => handleAnswerQuiz(q.id, 'false', q.correctAnswer)} className={`p-3 rounded-xl text-xs border font-medium ${selectedAnswers[q.id] === 'false' ? 'bg-indigo-600 text-white' : 'bg-white'}`}>❌ ✕</button>
                            </>
                          )}
                        </div>
                        {selectedAnswers[q.id] && (
                          <div className="mt-4 p-4 rounded-xl border bg-white space-y-2">
                            <div className="flex items-center gap-2">
                              {String(selectedAnswers[q.id]) === String(q.correctAnswer) ? <span className="text-emerald-600 font-bold text-sm">⭕ 正解！</span> : <span className="text-rose-500 font-bold text-sm">❌ 不正解 (正解: {String(q.correctAnswer) === 'true' ? '○' : String(q.correctAnswer) === 'false' ? '✕' : q.correctAnswer})</span>}
                            </div>
                            <div className="text-xs text-slate-600 bg-slate-50 p-3 rounded-lg border border-dashed">
                              <p className="font-bold text-indigo-600 mb-1">💡 AIの解説・アドバイス:</p>
                              {aiLoading[q.id] ? <p className="animate-pulse"><i className="fa-solid fa-spinner animate-spin"></i> 解説作成中...</p> : <p className="leading-relaxed whitespace-pre-line">{aiExplanations[q.id]}</p>}
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* AI質問箱 */}
              {activeTab === 'ai-chat' && (
                <div className="space-y-6">
                  <div>
                    <h2 className="text-xl font-bold text-slate-900">🧠 AI質問箱</h2>
                    <p className="text-slate-500 text-sm">勉強の疑問を質問してください。AIが降参した内容は自動で管理者の先生へ送信されます。</p>
                  </div>
                  <form onSubmit={handleAskAIBox} className="space-y-3">
                    <textarea value={userQuestion} onChange={e => setUserQuestion(e.target.value)} placeholder="質問を入力 (例: なぜ光は1秒間に地球を7周半も進めるの？)" className="w-full h-24 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm" required></textarea>
                    <button type="submit" disabled={chatLoading} className="bg-indigo-600 text-white text-sm font-bold px-4 py-2.5 rounded-xl shadow-md w-full sm:w-auto">{chatLoading ? '🤖 思考中...' : 'AIに質問する'}</button>
                  </form>
                  {aiChatResponse && (
                    <div className="p-4 bg-indigo-50 border border-indigo-100 rounded-xl space-y-2">
                      <p className="text-xs font-bold text-indigo-700">🤖 回答:</p>
                      <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-line">{aiChatResponse}</p>
                    </div>
                  )}
                </div>
              )}

              {/* ルーム機能（作成と入室を完全に分離 ＆ エラー検知強化版） */}
              {activeTab === 'room' && (
                <div className="space-y-6">
                  <div>
                    <h2 className="text-xl font-bold text-slate-900">👥 ルーム会議室</h2>
                    <p className="text-slate-500 text-sm">新しくルームを登録するか、作成済みのルーム一覧から選択して入室してください。</p>
                  </div>
                  
                  {!currentRoom ? (
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                      {/* 左・中央側：【新規作成専用】フォーム */}
                      <div className="lg:col-span-2 bg-slate-50 p-5 rounded-2xl border space-y-4">
                        <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2">
                          <i className="fa-solid fa-square-plus text-indigo-600"></i> 新しいルームを新規作成・登録
                        </h3>
                        <form onSubmit={async (e) => {
                          e.preventDefault();
                          const roomName = roomInput.trim();
                          if (!roomName) return;
                          if (!db) return alert("⚠️ データベースが接続されていません。");
                          
                          try {
                            // すでに同じ名前のルームがないかチェック
                            const roomRef = doc(db, "rooms", roomName);
                            const roomSnap = await getDoc(roomRef);
                            if (roomSnap.exists()) {
                              alert(`❌ 「${roomName}」はすでに作成されています。右側の一覧から入室するか、別の名前を入力してください。`);
                              return;
                            }

                            // 作成処理を実行
                            await setDoc(roomRef, {
                              name: roomName,
                              meetLink: meetLinkInput.trim() || "https://meet.google.com/",
                              createdAt: new Date().toISOString()
                            });
                            
                            alert(`🎉 ルーム「${roomName}」を作成しました！右側の一覧から入室してください。`);
                            setRoomInput('');
                            setMeetLinkInput('');
                          } catch (err) {
                            console.error("ルーム作成中の詳細エラー:", err);
                            // 画面に具体的なエラー理由をアラート表示
                            alert(`⚠️ ルーム作成に失敗しました。\n理由: ${err.message}\n\n※Firestoreのセキュリティルールを確認してください。`);
                          }
                        }} className="space-y-4">
                          <div>
                            <label className="block text-xs font-bold text-slate-600 mb-1">① ルーム名（重複不可）</label>
                            <input type="text" value={roomInput} onChange={e => setRoomInput(e.target.value)} placeholder="例: 数学演習、質問部屋B" className="w-full px-4 py-2 rounded-xl border font-bold outline-none focus:ring-2 focus:ring-indigo-500" required />
                          </div>
                          <div>
                            <label className="block text-xs font-bold text-slate-600 mb-1">② Google Meetリンク</label>
                            <input type="url" value={meetLinkInput} onChange={e => setMeetLinkInput(e.target.value)} placeholder="https://meet.google.com/xxx-xxxx-xxx" className="w-full px-4 py-2 rounded-xl border text-sm outline-none focus:ring-2 focus:ring-indigo-500" />
                            <p className="text-[10px] text-slate-400 mt-1">※空欄時はデフォルトのGoogle Meetが適用されます。</p>
                          </div>
                          <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-6 rounded-xl block w-full transition-all shadow-md text-sm">
                            <i className="fa-solid fa-plus mr-1"></i> ルームを新規作成する（入室はしません）
                          </button>
                        </form>
                      </div>

                      {/* 右側：【入室専用】作成済みのルーム一覧 */}
                      <div className="bg-white p-5 rounded-2xl border border-slate-200 space-y-3 max-h-[360px] overflow-y-auto">
                        <h3 className="text-sm font-bold text-slate-800 flex items-center justify-between">
                          <span><i className="fa-solid fa-right-to-bracket text-emerald-600 mr-1"></i> ルームを選んで入室</span>
                          <span className="bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-full">{availableRooms.length}</span>
                        </h3>
                        {availableRooms.length === 0 ? (
                          <p className="text-xs text-slate-400 text-center py-12 border border-dashed rounded-xl">まだルームがありません。<br/>左のフォームから作成してください。</p>
                        ) : (
                          <div className="space-y-2">
                            {availableRooms.map((rm) => (
                              <div key={rm.id} className="p-3 border border-slate-100 rounded-xl bg-slate-50 hover:bg-emerald-50/50 transition-all flex justify-between items-center group">
                                <div className="truncate pr-2">
                                  <p className="text-xs font-bold text-slate-800 truncate">{rm.name}</p>
                                  <p className="text-[10px] text-slate-400 font-mono truncate" title={rm.meetLink}>{rm.meetLink}</p>
                                </div>
                                <button 
                                  onClick={() => {
                                    setCurrentRoom(rm.name);
                                  }}
                                  className="shrink-0 bg-white group-hover:bg-emerald-600 text-emerald-600 group-hover:text-white border border-emerald-200 group-hover:border-transparent text-xs font-bold px-3 py-1.5 rounded-lg transition-all"
                                >
                                  入室 <i className="fa-solid fa-door-open text-[10px] ml-0.5"></i>
                                </button>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  ) : (
                    /* 入室後の画面 */
                    <div className="space-y-4">
                      <div className="p-4 bg-emerald-50 border border-emerald-100 rounded-xl flex justify-between items-center">
                        <p className="text-sm font-bold text-emerald-800">
                          <i className="fa-solid fa-door-open mr-1.5"></i>ルーム「<strong>{currentRoom}</strong>」に滞在中
                        </p>
                        <button onClick={() => setCurrentRoom(null)} className="bg-rose-100 hover:bg-rose-200 text-rose-700 px-3 py-1 rounded-lg text-xs font-bold transition-all">退室する</button>
                      </div>

                      <div className="border border-slate-200 rounded-2xl p-6 bg-white shadow-sm space-y-4 text-center max-w-lg mx-auto">
                        <div className="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto text-2xl">
                          <i className="fa-solid fa-video"></i>
                        </div>
                        <div>
                          <h3 className="font-bold text-slate-800">Google Meet 遠隔通話</h3>
                          <p className="text-slate-500 text-xs mt-1">下のボタンを押すと、この部屋専用のビデオ通話ページが起動します。<br/>同時に、管理画面へ接続履歴が安全に記録されます。</p>
                        </div>
                        {currentMeetLink ? (
                          <button onClick={handleOpenMeet} className="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-all text-sm">
                            <i className="fa-solid fa-arrow-up-right-from-square"></i> Google Meet を起動して参加
                          </button>
                        ) : (
                          <p className="text-rose-500 text-xs">リンクの読み込み中、またはMeetが登録されていません。</p>
                        )}
                        <div className="bg-slate-50 p-2.5 rounded-xl border border-dashed text-left">
                          <span className="text-[10px] uppercase tracking-wider font-bold text-slate-400 block mb-0.5">登録中の通話URL</span>
                          <span className="text-xs text-slate-600 font-mono break-all">{currentMeetLink || "未設定"}</span>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* 🔒 管理画面 */}
              {activeTab === 'admin' && (
                <div>
                  {!isAdminAuthenticated ? (
                    <div className="max-w-md mx-auto py-12 space-y-6 text-center">
                      <div className="w-16 h-16 bg-slate-100 text-slate-700 rounded-full flex items-center justify-center mx-auto text-2xl shadow-inner">
                        <i className="fa-solid fa-lock"></i>
                      </div>
                      <div>
                        <h2 className="text-lg font-bold text-slate-900">管理者認証が必要です</h2>
                        <p className="text-slate-400 text-xs mt-1">コントロールパネルを開くにはパスワードを入力してください。</p>
                      </div>
                      <form onSubmit={handleAdminLogin} className="space-y-3">
                        <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="パスワードを入力してください" className="w-full px-4 py-2.5 rounded-xl border text-center font-mono outline-none focus:ring-2 focus:ring-slate-800" required />
                        {loginError && <p className="text-xs text-rose-500 font-medium">{loginError}</p>}
                        <button type="submit" className="w-full bg-slate-800 text-white font-bold py-2.5 rounded-xl hover:bg-slate-900 shadow-md text-sm transition-all">ロックを解除</button>
                      </form>
                      <p className="text-[10px] text-slate-300">※初期設定パスワードは「Haya1012」です</p>
                    </div>
                  ) : (
                    <div className="space-y-8">
                      <div className="flex justify-between items-start border-b pb-4">
                        <div>
                          <h2 className="text-xl font-bold text-rose-700 flex items-center gap-2">
                            <i className="fa-solid fa-shield-halved"></i>管理者用コントロールパネル
                          </h2>
                          <p className="text-slate-500 text-sm mt-0.5">AIからのヘルプ要請と、生徒のGoogle Meet通話アクティビティをリアルタイム監視できます。</p>
                        </div>
                        <button onClick={handleAdminLogout} className="bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg text-xs font-bold transition-all">
                          <i className="fa-solid fa-right-from-bracket mr-1"></i> ログアウト
                        </button>
                      </div>

                      {/* セクション1: Google Meet 接続アクティビティ状況 */}
                      <div className="space-y-3">
                        <h3 className="text-sm font-bold text-slate-800 flex items-center gap-1.5">
                          <span className="w-2 h-2 rounded-full bg-indigo-500"></span> 🔴 ルーム・Google Meet 起動追跡ログ
                        </h3>
                        {meetLogs.length === 0 ? (
                          <p className="text-xs text-slate-400 py-6 text-center border-2 border-dashed rounded-xl">Meetの参加履歴はまだありません。</p>
                        ) : (
                          <div className="overflow-hidden border border-slate-200 rounded-xl shadow-sm bg-white">
                            <table className="min-w-full divide-y divide-slate-200 text-left text-xs">
                              <thead className="bg-slate-50 text-slate-500 font-semibold">
                                <tr>
                                  <th className="px-4 py-2.5">参加したユーザー</th>
                                  <th className="px-4 py-2.5">利用ルーム</th>
                                  <th className="px-4 py-2.5">ターゲットMeetリンク</th>
                                  <th className="px-4 py-2.5">接続日時</th>
                                </tr>
                              </thead>
                              <tbody className="divide-y divide-slate-200 text-slate-700 font-medium">
                                {meetLogs.map(log => (
                                  <tr key={log.id} className="hover:bg-slate-50/80">
                                    <td className="px-4 py-2.5 text-indigo-600 font-bold"><i className="fa-solid fa-user text-[10px] mr-1"></i>{log.user}</td>
                                    <td className="px-4 py-2.5"><span className="bg-slate-100 px-2 py-0.5 rounded text-[11px] border">{log.room}</span></td>
                                    <td className="px-4 py-2.5 font-mono text-slate-400 max-w-xs truncate" title={log.meetLink}>{log.meetLink}</td>
                                    <td className="px-4 py-2.5 text-slate-400">{log.timestamp?.substring(5,16).replace('T', ' ')}</td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        )}
                      </div>

                      {/* セクション2: AIからの未対応質問エスカレーション */}
                      <div className="space-y-3">
                        <h3 className="text-sm font-bold text-slate-800 flex items-center gap-1.5">
                          <span className="w-2 h-2 rounded-full bg-rose-500"></span> 🚨 AIヘルプ・未対応質問リスト
                        </h3>
                        <div className="space-y-3">
                          {adminQuestions.length === 0 ? (
                            <p className="text-xs text-slate-400 py-6 text-center border-2 border-dashed rounded-xl">現在、対応が必要なAIエスカレーションはありません。</p>
                          ) : (
                            adminQuestions.map(aq => (
                              <div key={aq.id} className="p-4 border-2 border-rose-100 rounded-xl bg-rose-50/20 space-y-2">
                                <div className="flex justify-between text-xs text-slate-400 font-mono">
                                  <span>ステータス: <strong className="text-rose-600">{aq.status}</strong></span>
                                  <span>{aq.createdAt?.substring(0,16).replace('T', ' ')}</span>
                                </div>
                                <p className="text-sm font-bold text-slate-800">🤔 ユーザーからの質問:</p>
                                <p className="bg-white p-3 rounded-lg border text-sm text-slate-700 shadow-sm font-medium">「 {aq.question} 」</p>
                                <div className="flex justify-end gap-2 pt-1">
                                  <button onClick={async () => await updateDoc(doc(db, "admin_escalations", aq.id), {status: "回答済み"})} className="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold px-3 py-1.5 rounded-lg shadow-sm transition-all">対応完了（解決済みにする）</button>
                                  <button onClick={async () => await deleteDoc(doc(db, "admin_escalations", aq.id))} className="text-slate-400 hover:text-rose-600 text-xs font-bold px-2 py-1.5 transition-all">履歴を削除</button>
                                </div>
                              </div>
                            ))
                          )}
                        </div>
                      </div>

                    </div>
                  )}
                </div>
              )}

            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
